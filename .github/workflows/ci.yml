name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-and-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Compilar todos los módulos Python (chequeo de sintaxis)
        run: python -m py_compile $(find src scripts -name "*.py")

      - name: Ejecutar tests unitarios (sin red ni BD)
        run: pytest tests/unit -v
